# ==================== PlatformIO Configuration ====================
# Capellán LED - Unified Firmware Multi-Platform
# Soporta: ESP8266, ESP32, ESP32-C3, ESP32-S3
# Data Pin: GPIO2
# ====================================================================

[platformio]
default_envs = d1_mini

# ==================== ESP8266 D1 Mini Configuration ====================
[env:d1_mini]
platform = espressif8266@4.2.0
board = d1_mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit NeoPixel@^1.11.0
    ArduinoJson@^6.21.0

build_flags =
    -D SERIAL_BAUD=115200
    -D LED_PIN=2
    -D LED_COUNT=60

# ==================== ESP32 Estándar Configuration ====================
[env:esp32]
platform = espressif32@6.5.0
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit NeoPixel@^1.11.0
    ArduinoJson@^6.21.0

build_flags =
    -D SERIAL_BAUD=115200
    -D LED_PIN=2
    -D LED_COUNT=60

# ==================== ESP32-C3 Configuration ====================
[env:esp32c3]
platform = espressif32@6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit NeoPixel@^1.11.0
    ArduinoJson@^6.21.0

build_flags =
    -D SERIAL_BAUD=115200
    -D LED_PIN=2
    -D LED_COUNT=60

# ==================== ESP32-S3 (Groom-32) Configuration ====================
[env:esp32s3]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit NeoPixel@^1.11.0
    ArduinoJson@^6.21.0

build_flags =
    -D SERIAL_BAUD=115200
    -D LED_PIN=2
    -D LED_COUNT=60

# ==================== Monitor Options (Todos los ambientes) ====================
[common_monitor]
monitor_filters =
    esp8266_exception_decoder
    time

[env:d1_mini]
extends = common_monitor

[env:esp32]
extends = common_monitor

[env:esp32c3]
extends = common_monitor

[env:esp32s3]
extends = common_monitor
